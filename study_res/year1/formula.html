	<h1>
		Formule in $\LaTeX$
	</h1>

	Ecco la formula richiesta dall'esercitazione di LCMC. <br>
	In particolare, mi è stata assegnata la formula 10.4.99 del formulario di Abramowitz e Stegun: <br><br>
	
	<center>$ b_{s}' = -g[3\pi(4s-1)/8] $</center>
